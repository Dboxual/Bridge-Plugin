name: TheBridge
version: '1.3.8'
main: com.thebridge.TheBridgePlugin
api-version: '1.21'
description: The Bridge minigame — arena infrastructure
depend: [FastAsyncWorldEdit]

commands:
  bridge:
    description: TheBridge admin command
    usage: /bridge <subcommand>
    permission: bridge.admin

permissions:
  bridge.admin:
    description: Access to all TheBridge admin commands
    default: op
    children:
      bridge.play: true
  bridge.play:
    description: Join Bridge queues and play matches
    default: true
